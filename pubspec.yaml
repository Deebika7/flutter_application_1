name: flutter_application_1
description: "A Flutter Task Manager app demonstrating MVVM architecture and core Flutter concepts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT — Provider is the official Flutter team recommendation.
  # It works with ChangeNotifier to implement the ViewModel layer of MVVM.
  provider: ^6.1.2

  # LOCAL DATABASE — sqflite is the standard SQLite plugin for Flutter.
  # Used here as the persistence layer (Service layer in MVVM).
  sqflite: ^2.4.1

  # PATH UTILITIES — needed to locate the database file on each platform.
  path_provider: ^2.1.5
  path: ^1.9.1

  # DATE FORMATTING — intl provides DateFormat for human-readable dates.
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
